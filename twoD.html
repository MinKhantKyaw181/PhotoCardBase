<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Multi Image AR (iOS / Android / PC)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;background:#000;font-family:Arial}
#startScreen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:10;color:white
}
#startBtn{
  padding:16px 36px;font-size:18px;
  border:none;border-radius:30px;
  background:#00ffcc;font-weight:bold
}
#hint{margin-top:15px;font-size:14px;opacity:.8}
a-scene{display:none}
</style>
</head>

<body>

<div id="startScreen">
  <h2>📷 AR Image Scanner</h2>
  <button id="startBtn">Start AR</button>
  <div id="hint">Point camera to image / Tap image for sound</div>
</div>

<a-scene id="scene"
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

<a-assets>
  <!-- Images -->
  <img id="cpuImg" src="images/cpu.jpg">
  <img id="mbImg" src="images/motherboard.png">
  <img id="ramImg" src="images/ram.jpg">
  <img id="routerImg" src="images/router.jpg">
  <img id="switchImg" src="images/switch.jpg">

  <!-- Audio -->
  <audio id="cpuSound" src="audio/cpu.mp3" preload="auto"></audio>
  <audio id="mbSound" src="audio/motherboard.mp3" preload="auto"></audio>
  <audio id="ramSound" src="audio/ram.mp3" preload="auto"></audio>
  <audio id="routerSound" src="audio/router.mp3" preload="auto"></audio>
  <audio id="switchSound" src="audio/switch.mp3" preload="auto"></audio>
</a-assets>

<a-camera
  look-controls="enabled:false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">
</a-camera>

<!-- TARGET TEMPLATE -->
<a-entity class="target" mindar-image-target="targetIndex:0" data-sound="cpuSound">
  <a-plane class="clickable" src="#cpuImg" width="1" height="0.7"></a-plane>
</a-entity>

<a-entity class="target" mindar-image-target="targetIndex:1" data-sound="mbSound">
  <a-plane class="clickable" src="#mbImg" width="1" height="0.7"></a-plane>
</a-entity>

<a-entity class="target" mindar-image-target="targetIndex:2" data-sound="ramSound">
  <a-plane class="clickable" src="#ramImg" width="1" height="0.7"></a-plane>
</a-entity>

<a-entity class="target" mindar-image-target="targetIndex:3" data-sound="routerSound">
  <a-plane class="clickable" src="#routerImg" width="1" height="0.7"></a-plane>
</a-entity>

<a-entity class="target" mindar-image-target="targetIndex:4" data-sound="switchSound">
  <a-plane class="clickable" src="#switchImg" width="1" height="0.7"></a-plane>
</a-entity>

</a-scene>

<script>
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const scene = document.getElementById("scene");
const audios = document.querySelectorAll("audio");

let unlocked = false;
let lastAudio = null;

// 🔓 AUDIO UNLOCK (CRITICAL)
startBtn.onclick = async () => {
  for (let a of audios) {
    a.muted = true;
    try { await a.play(); } catch(e){}
    a.pause();
    a.currentTime = 0;
    a.muted = false;
  }

  unlocked = true;
  startScreen.style.display = "none";
  scene.style.display = "block";
  await scene.systems["mindar-image-system"].start();
};

// 🎯 TARGET FOUND (Laptop auto-play)
document.querySelectorAll(".target").forEach(t => {
  t.addEventListener("targetFound", () => {
    if (!unlocked) return;
    const audio = document.getElementById(t.dataset.sound);
    if (lastAudio && lastAudio !== audio) {
      lastAudio.pause(); lastAudio.currentTime = 0;
    }
    audio.play().catch(()=>{});
    lastAudio = audio;
  });

  t.addEventListener("targetLost", () => {
    const audio = document.getElementById(t.dataset.sound);
    audio.pause();
    audio.currentTime = 0;
  });
});

// 👉 TAP FALLBACK (Mobile guaranteed)
document.querySelectorAll(".clickable").forEach(p => {
  p.addEventListener("click", () => {
    if (!unlocked) return;
    const soundId = p.parentElement.dataset.sound;
    const audio = document.getElementById(soundId);
    audios.forEach(a => {a.pause(); a.currentTime=0});
    audio.play();
  });
});
</script>

</body>
</html>
