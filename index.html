<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Component Scanner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;background:#000;font-family:Arial}
#startScreen{
  position:fixed; inset:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:10; color:white; text-align:center; padding:0 20px
}
#startBtn{
  padding:16px 36px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#00ffcc;
  font-weight:bold;
  margin-top:16px;
  cursor:pointer
}
#status{
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#00ffcc; padding:8px 20px;
  border-radius:20px; font-size:0.85rem; letter-spacing:1px;
  z-index:50; display:none; border:1px solid #00ffcc44;
  white-space:nowrap; max-width:90vw; text-align:center;
}
a-scene{display:none}
</style>
</head>

<body>

<div id="startScreen">
  <h2>🧩 Augmented Reality</h2>
  <p>Point camera at photos</p>
  <button id="startBtn">Start AR</button>
</div>
<div id="status">🔍 Scanning…</div>

<a-scene id="scene"
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false;">

<a-assets>
  <!-- glb models are intentionally NOT preloaded here anymore.
       Each a-gltf-model below carries its real path in data-src
       and starts with src="" — the script loads it on first
       targetFound for that specific target only. -->

  <audio id="sound0" src="audio/arduino.mp3"></audio>
  <audio id="sound1" src="audio/breadboard.mp3"></audio>
  <audio id="sound2" src="audio/cpu.mp3"></audio>
  <audio id="soundGpu" src="audio/gpu.mp3"></audio>
  <audio id="sound3" src="audio/hdd.mp3"></audio>
  <audio id="sound4" src="audio/motherboard.mp3"></audio>
  <audio id="sound5" src="audio/nic.mp3"></audio>
  <audio id="sound6" src="audio/ram.mp3"></audio>
  <audio id="sound7" src="audio/router.mp3"></audio>
  <audio id="sound8" src="audio/ssd.mp3"></audio>
</a-assets>

<a-camera
  look-controls="enabled:false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">
</a-camera>

<script>
const startBtn    = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const scene       = document.getElementById("scene");
const statusDiv   = document.getElementById("status");
const targets     = document.querySelectorAll(".target");

let currentAudio = null;

startBtn.onclick = async () => {
  // Unlock autoplay for every audio element (required on iOS/Android
  // before any audio.play() call will succeed later).
  //
  // IMPORTANT: play() must NOT be awaited here. Awaiting it means the
  // promise only resolves once the file has actually buffered enough
  // to start outputting sound — on iOS Safari that buffering happens
  // over the network and takes real time, during which the audio is
  // audibly playing before our pause() ever runs. With 10 files awaited
  // one after another, that adds up to several seconds of overlapping
  // audible playback right at startup ("all sounds play at once").
  // Calling play() and pause() back-to-back in the same synchronous
  // tick (no await) registers the user-gesture unlock without ever
  // letting real audio output start. volume=0 is added as a second
  // safety net, since iOS Safari has a known quirk where `muted = true`
  // doesn't always take effect instantly.

  for (const a of document.querySelectorAll("audio")) {
    a.muted = true;
    a.volume = 0;
    a.play().catch(() => {});
    a.pause();
    a.currentTime = 0;
    a.muted = false;
    a.volume = 1;
  }

  startScreen.style.display = "none";
  scene.style.display = "block";
  statusDiv.style.display = "block";
  await scene.systems["mindar-image-system"].start();
};

// Per-target sound + status text + LAZY glb loading.
// Each target's own model is only fetched the first time that
// specific target is found — not all 10 up front.
targets.forEach((target) => {
  const audioEl = document.getElementById(target.dataset.sound);
  const name    = target.dataset.name;
  const model   = target.querySelector("a-gltf-model");
  let modelLoaded = false;

  target.addEventListener("targetFound", () => {
    if (!modelLoaded) {
      model.setAttribute("src", model.dataset.src);
      modelLoaded = true;
    }

    if (currentAudio && currentAudio !== audioEl) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    statusDiv.textContent = "✅ " + name + " detected";
    audioEl.currentTime = 0;
    audioEl.play().catch(() => {});
    currentAudio = audioEl;
  });

  target.addEventListener("targetLost", () => {
    audioEl.pause();
    audioEl.currentTime = 0;
    if (currentAudio === audioEl) currentAudio = null;
    statusDiv.textContent = "🔍 Scanning…";
  });
});
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
