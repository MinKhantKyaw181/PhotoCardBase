<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Multi Image AR with 3D Models</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;background:#000;font-family:Arial}
#startScreen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:10;color:white
}
#startBtn{
  padding:16px 36px;font-size:18px;
  border:none;border-radius:30px;
  background:#00ffcc;font-weight:bold
}
#hint{margin-top:15px;font-size:14px;opacity:.8}
a-scene{display:none}
</style>
</head>

<body>

<div id="startScreen">
  <h2>📦 AR 3D Scanner</h2>
  <button id="startBtn">Start AR</button>
  <div id="hint">Point camera to image / Tap model for sound</div>
</div>

<a-scene id="scene"
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

<a-assets>
  <!-- 3D MODELS -->
  <a-asset-item id="cpuModel" src="models/cpu.glb"></a-asset-item>
  <a-asset-item id="mbModel" src="models/motherboard.glb"></a-asset-item>
  <a-asset-item id="ramModel" src="models/ram.glb"></a-asset-item>
  <a-asset-item id="routerModel" src="models/router.glb"></a-asset-item>
  <a-asset-item id="switchModel" src="models/switch.glb"></a-asset-item>

  <!-- AUDIO -->
  <audio id="cpuSound" src="audio/cpu.mp3"></audio>
  <audio id="mbSound" src="audio/motherboard.mp3"></audio>
  <audio id="ramSound" src="audio/ram.mp3"></audio>
  <audio id="routerSound" src="audio/router.mp3"></audio>
  <audio id="switchSound" src="audio/switch.mp3"></audio>
</a-assets>

<a-camera
  look-controls="enabled:false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">
</a-camera>

<!-- CPU -->
<a-entity class="target" mindar-image-target="targetIndex:0" data-sound="cpuSound">
  <a-gltf-model
    class="clickable"
    src="#cpuModel"
    position="0 0 0"
    rotation="-90 0 0"
    scale="0.5 0.5 0.5">
  </a-gltf-model>
</a-entity>

<!-- MOTHERBOARD -->
<a-entity class="target" mindar-image-target="targetIndex:1" data-sound="mbSound">
  <a-gltf-model
    class="clickable"
    src="#mbModel"
     position="0 0 0"
    rotation="90 0 0"
    scale="0.3 0.3 0.3">
  </a-gltf-model>
</a-entity>

<!-- RAM -->
<a-entity class="target" mindar-image-target="targetIndex:2" data-sound="ramSound">
  <a-gltf-model
    class="clickable"
    src="#ramModel"
    position="0 0 0"
    rotation="-90 0 0"
    scale="0 0 0">
  </a-gltf-model>
</a-entity>

<!-- ROUTER -->
<a-entity class="target" mindar-image-target="targetIndex:3" data-sound="routerSound">
  <a-gltf-model
    class="clickable"
    src="#routerModel"
    scale="0.3 0.3 0.3"
    rotation="0 0 0">
  </a-gltf-model>
</a-entity>

<!-- SWITCH -->
<a-entity class="target" mindar-image-target="targetIndex:4" data-sound="switchSound">
  <a-gltf-model
    class="clickable"
    src="#switchModel"
     position="0 0 0"
    rotation="-90 0 0"
    scale="0.5 0.5 0.5">
  </a-gltf-model>
</a-entity>

</a-scene>

<script>
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const scene = document.getElementById("scene");
const audios = document.querySelectorAll("audio");

let unlocked = false;
let lastAudio = null;

// 🔓 AUDIO UNLOCK (Mobile required)
startBtn.onclick = async () => {
  for (let a of audios) {
    a.muted = true;
    try { await a.play(); } catch(e){}
    a.pause();
    a.currentTime = 0;
    a.muted = false;
  }

  unlocked = true;
  startScreen.style.display = "none";
  scene.style.display = "block";
  await scene.systems["mindar-image-system"].start();
};

// 🎯 Auto play (Laptop)
document.querySelectorAll(".target").forEach(t => {
  t.addEventListener("targetFound", () => {
    if (!unlocked) return;
    const audio = document.getElementById(t.dataset.sound);
    if (lastAudio && lastAudio !== audio) {
      lastAudio.pause(); lastAudio.currentTime = 0;
    }
    audio.play().catch(()=>{});
    lastAudio = audio;
  });

  t.addEventListener("targetLost", () => {
    const audio = document.getElementById(t.dataset.sound);
    audio.pause();
    audio.currentTime = 0;
  });
});

// 👉 TAP fallback (Mobile)
document.querySelectorAll(".clickable").forEach(m => {
  m.addEventListener("click", () => {
    if (!unlocked) return;
    const soundId = m.parentElement.dataset.sound;
    audios.forEach(a => {a.pause(); a.currentTime=0});
    document.getElementById(soundId).play();
  });
});
</script>

</body>
</html>
